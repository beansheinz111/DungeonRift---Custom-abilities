name: MagicWandPlugin
version: 1.0
main: com.magicwand.plugin.MagicWandPlugin
api-version: 1.21
author: Grok
description: Adds magic effects to a custom warped_fungus_on_a_stick with item_model="template/wand". Right-click casts a line of evoker fangs + particles.

commands:
  givewand:
    description: Gives the player the Arcane Wand
    usage: /<command> [player]
    permission: magicwand.give

  givemagicbook:
    description: Gives the player the Tome of Arcane Surge (Magic Book)
    usage: /<command> [player]
    permission: magicwand.give

  givewindsword:
    description: Gives the player the Zephyr Blade (Wind Sword)
    usage: /<command> [player]
    permission: magicwand.give

  giveskullcrusher:
    description: Gives the player the Skull Crusher mace
    usage: /<command> [player]
    permission: magicwand.give

  givefiremace:
    description: Gives the player the Fire Mace
    usage: /<command> [player]
    permission: magicwand.give

permissions:
  magicwand.give:
    description: Allows giving custom magic items
    default: op
